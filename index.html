<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Quest</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
    padding:20px;
    min-height:100vh;
}

.card{
    background:white;
    color:#333;
    max-width:500px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    margin-bottom:10px;
}

.word{
    font-size:2rem;
    font-weight:bold;
    margin:20px 0;
    color:#764ba2;
}

input{
    width:80%;
    padding:12px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#764ba2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
    font-weight:bold;
}

#result{
    margin-top:15px;
    min-height:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>🐼 Chinese Quest</h1>
    <p>Translate the Pinyin into English</p>

    <div class="word" id="word"></div>

    <input type="text" id="answer" placeholder="Your answer">
    <br>

    <button onclick="checkAnswer()">Submit</button>

    <div id="result"></div>

    <div class="stats">
        <div>⭐ XP: <span id="xp">0</span></div>
        <div>🏆 Level: <span id="level">1</span></div>
        <div>🔥 Streak: <span id="streak">0</span></div>
    </div>
</div>

<script>
const words = [
    {py:"nǐ hǎo", en:"hello"},
    {py:"xiè xie", en:"thank you"},
    {py:"zàijiàn", en:"goodbye"},
    {py:"chá", en:"tea"},
    {py:"shuǐ", en:"water"},
    {py:"péngyou", en:"friend"},
    {py:"māo", en:"cat"},
    {py:"gǒu", en:"dog"},
    {py:"wǒ", en:"i"},
    {py:"nǐ", en:"you"},
    {py:"shì", en:"is"},
    {py:"bù", en:"not"},
    {py:"xuéshēng", en:"student"},
    {py:"lǎoshī", en:"teacher"},
    {py:"mǐfàn", en:"rice"}
];

let currentWord;
let xp = 0;
let streak = 0;

function newQuestion(){
    currentWord = words[Math.floor(Math.random()*words.length)];
    document.getElementById("word").textContent = currentWord.py;
    document.getElementById("answer").value = "";
}

function checkAnswer(){
    const answer =
        document.getElementById("answer")
        .value
        .trim()
        .toLowerCase();

    if(answer === currentWord.en.toLowerCase()){
        xp += 10;
        streak++;

        document.getElementById("result").innerHTML =
        "✅ Correct!";
    }
    else{
        streak = 0;

        document.getElementById("result").innerHTML =
        "❌ Correct answer: <b>" +
        currentWord.en +
        "</b>";
    }

    document.getElementById("xp").textContent = xp;
    document.getElementById("streak").textContent = streak;
    document.getElementById("level").textContent =
        Math.floor(xp/50)+1;

    setTimeout(newQuestion,1500);
}

newQuestion();

document.getElementById("answer")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        checkAnswer();
    }
});
</script>

</body>
</html>
